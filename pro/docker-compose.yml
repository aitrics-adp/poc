# EC2 단일 서버 운영용
# 사용:
#   1. EC2 인스턴스 (t3.small ↑) + Elastic IP + Security Group (80/443/22)
#   2. Docker + docker-compose 설치
#   3. git clone + .env 작성 + docker compose up -d
#
# 도메인 + HTTPS는 Caddy가 자동 처리 (Let's Encrypt)

services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose: ["8000"]
    environment:
      DATABASE_URL: postgresql://tripro:${DB_PASSWORD}@db:5432/tripro
      LLM_MODE: ${LLM_MODE:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: mailto:tri-pro-poc@aitrics.com
      CORS_ORIGINS: ${CORS_ORIGINS:-https://patient.example.com,https://admin.example.com}
    depends_on:
      db:
        condition: service_healthy

  patient:
    build:
      context: ./patient-app
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped
    expose: ["3000"]
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}

  admin:
    build:
      context: ./admin-app
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped
    expose: ["3001"]
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tripro
      POSTGRES_USER: tripro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripro"]
      interval: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend, patient, admin]

volumes:
  pgdata:
  caddy_data:
  caddy_config:
